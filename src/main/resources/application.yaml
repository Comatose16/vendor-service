spring:
  application:
    name: venue-service

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/fts
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate Configuration
  jpa:
    database-platform: org.hibernate.spatial.dialect.postgis.PostgisPGDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true